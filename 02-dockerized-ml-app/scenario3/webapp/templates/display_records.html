<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scenario 3 - Records</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 2rem; }
      table { border-collapse: collapse; width: 100%; max-width: 960px; }
      td, th { border: 1px solid #ddd; padding: 8px; }
      .error { color: #b00020; }
    </style>
  </head>
  <body>
    <h1>Saved Predictions</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <table>
      <thead>
        <tr><th>ID</th><th>f1</th><th>f2</th><th>f3</th><th>f4</th><th>f5</th><th>Class</th><th>Time</th></tr>
      </thead>
      <tbody>
        {% for p in predictions %}
          <tr>
            <td>{{ p.id }}</td>
            <td>{{ p.f1 }}</td>
            <td>{{ p.f2 }}</td>
            <td>{{ p.f3 }}</td>
            <td>{{ p.f4 }}</td>
            <td>{{ p.f5 }}</td>
            <td>{{ p.predicted_class }}</td>
            <td>{{ p.timestamp }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
    <p><a href="/">Back</a></p>
  </body>
  </html>
