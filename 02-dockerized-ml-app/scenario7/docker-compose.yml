version: '3.9'

services:
  dbapp:
    build: ./dbapp
    ports:
      - "8001:8001"
    container_name: cntdbapp
    image: dbapp_multistage
    networks:
      - appnet

  webapp:
    build: ./webapp
    ports:
      - "8000:8000"
    container_name: cntwebapp
    image: webapp_multistage
    depends_on:
      - dbapp
    networks:
      - appnet

networks:
  appnet:
    driver: bridge


