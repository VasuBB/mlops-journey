<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scenario 2 - Iris Predictor</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 2rem; }
      form { display: grid; gap: .5rem; max-width: 420px; }
      input, button { padding: .5rem .75rem; font-size: 1rem; }
      .error { color: #b00020; }
    </style>
  </head>
  <body>
    <h1>Scenario 2</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="/predict">
      <input name="feature1" placeholder="Feature 1" required />
      <input name="feature2" placeholder="Feature 2" required />
      <input name="feature3" placeholder="Feature 3" required />
      <input name="feature4" placeholder="Feature 4" required />
      <input name="feature5" placeholder="Feature 5" required />
      <button type="submit">Predict</button>
    </form>
    <p><a href="/records">View saved records</a></p>
  </body>
  </html>
